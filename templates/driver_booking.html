<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>志工司機開放共乘登記</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">🚙 我要當司機（開放共乘）</h2>
                    <form action="/carpool/driver" method="POST">
                        <div class="mb-3">
                            <label class="form-label">司機姓名</label>
                            <input type="text" class="form-control" name="driver_name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">連絡電話</label>
                            <input type="text" class="form-control" name="driver_phone" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">出發起點</label>
                            <input type="text" class="form-control" name="start" placeholder="例如：貢寮火車站" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">目的地 / 經由路線</label>
                            <input type="text" class="form-control" name="destination" placeholder="例如：醫院 / 市區" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">可出發時間</label>
                            <input type="datetime-local" class="form-control" name="time" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">車上空位數</label>
                            <input type="number" class="form-control" name="seats" value="3" min="1" max="8" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">發布我的順風車行程</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="/carpool" class="text-decoration-none">⬅ 回共乘選單</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
