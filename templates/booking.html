<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約共乘車</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4 text-success fw-bold">🚗 填寫共乘車預約</h2>

                        <form action="/carpool/book" method="POST">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">乘車人姓名</label>
                                <input type="text" class="form-control form-control-lg" id="name" name="name" required placeholder="例如：王大明">
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label fw-bold">聯絡電話</label>
                                <input type="tel" class="form-control form-control-lg" id="phone" name="phone" required placeholder="例如：0912345678">
                            </div>
                            <div class="mb-3">
                                <label for="start" class="form-label fw-bold">上車地點</label>
                                <input type="text" class="form-control form-control-lg" id="start" name="start" required placeholder="例如：內寮活動中心">
                            </div>
                            <div class="mb-3">
                                <label for="destination" class="form-label fw-bold">下車地點</label>
                                <input type="text" class="form-control form-control-lg" id="destination" name="destination" required placeholder="例如：基隆長庚醫院">
                            </div>
                            <div class="mb-3">
                                <label for="time" class="form-label fw-bold">預約時間</label>
                                <input type="datetime-local" class="form-control form-control-lg" id="time" name="time" required>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100 mt-3">確認送出預約</button>
                        </form>

                        <div class="mt-3 text-center">
                            <a href="/carpool" class="btn btn-secondary btn-sm">回共乘選單</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
