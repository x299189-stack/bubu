<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共乘現況與 GPS 追蹤</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="text-center mb-4 text-success fw-bold">📍 共乘現況與 GPS 即時追蹤</h2>
        
        <div class="card shadow mb-4">
            <div class="card-body text-center py-4">
                <p class="text-muted mb-4">請選擇您要使用的功能：</p>
                
                <!-- 按鈕 1：看地圖看板 -->
                <a href="/carpool/live_map" class="btn btn-primary btn-lg w-100 mb-3 py-3 fw-bold">
                    🗺️ 車隊即時動態追蹤看板 (乘客/管理員)
                </a>
                
                <!-- 按鈕 2：司機回報定位 -->
                <a href="/carpool/driver_gps" class="btn btn-warning btn-lg w-100 py-3 fw-bold text-dark">
                    📍 司機即時定位回報 (司機專用)
                </a>
            </div>
        </div>

        <div class="text-center">
            <a href="/carpool" class="btn btn-secondary">回共乘選單</a>
        </div>
    </div>
</body>
</html>
